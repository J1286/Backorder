<head>
    <title>Backorder System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginBox">
  <h2>Backorder Login</h2>

  <input
    id="email"
    type="email"
    placeholder="Email"
  >

  <br><br>

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <br><br>

  <button onclick="login()">
    Login
  </button>

  <p id="loginError" style="color:red;"></p>
</div>

<div id="app" style="display:none;">
    
<div class="controls" style="margin-bottom:12px;">
  <button onclick="exportCSV()">Export CSV</button>
  <button onclick="exportCSV(true)">Export Selected</button>
  <button onclick="showProfile()">Profile</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="dashboard" class="dashboard">

  <div class="dashboard-card" id="cardTotal">
    <div class="dashboard-title">Total Orders</div>
    <div class="dashboard-value" id="totalOrders">0</div>
  </div>

  <div class="dashboard-card" id="cardRedline">
    <div class="dashboard-title">Redline360</div>
    <div class="dashboard-value" id="redlineOrders">0</div>
  </div>

  <div class="dashboard-card" id="cardECS">
    <div class="dashboard-title">ECS</div>
    <div class="dashboard-value" id="ecsOrders">0</div>
  </div>

  <div class="dashboard-card" id="cardTDOT">
    <div class="dashboard-title">TDOT</div>
    <div class="dashboard-value" id="tdotOrders">0</div>
  </div>

  <div class="dashboard-card" id="cardOthers">
    <div class="dashboard-title">Others</div>
    <div class="dashboard-value" id="otherOrders">0</div>
  </div>

</div>
    
<label for="searchBox">Search:</label>
<input id="searchBox" placeholder="Search Orders..." style="margin-bottom:10px; width:200px;">

<br><br>

<label for="dealerSelect">Dealer:</label>
<select id="dealerSelect">
  <option value="all">All</option>
  <option value="redline360">Redline360</option>
  <option value="ecs">ECS</option>
  <option value="tdot">TDOT</option>
  <option value="others">OTHERS</option>
</select>

<br><br>

<div class="actions">
  <button onclick="undo()">Undo</button>
  <button onclick="redo()">Redo</button>
  <button onclick="addRow()">Add Orders</button>
  <button onclick="copyMarkedRows()">Copy Selected</button>  
</div>
<br>

<div id="tableContainer">
  <table id="backorderTable" border="1">
    <thead>
      <tr id="headerRow"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
</div>

    <div id="profileModal" class="modal">
  <div class="modal-content">
    <span id="closeProfile">&times;</span>
    <h2>User Profile</h2>
    <p id="currentEmail"></p>

    <label>
      Display Name:
    </label>
    <br>
    <input id="displayNameInput" placeholder="Your name">
    <br><br>
    <button onclick="saveProfileName()">
      Save
    </button>
  </div>
</div>

    <div id="historyModal" class="modal">
    <div class="modal-content">
        <span id="closeHistory">&times;</span>
        <h2>Order History</h2>
        <div id="historyBody"></div>
    </div>

</div>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body> 
</html>
